name: Build and Deploy to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ssh-reports-enricher

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: EXPECTED_SHA,PROJECT_DIR,REPO_NAME,REPO_OWNER
          script: |
            set -eu

            DEPLOY_DIR="${PROJECT_DIR:-/home/ubuntu/workspace/internal.private-hub/apps/scrapers/ssh-reports-enricher}"
            if [ "$(basename "$DEPLOY_DIR")" = "internal.private-hub" ] || [ "$(basename "$DEPLOY_DIR")" = "external.reports-hub" ]; then
              DEPLOY_DIR="/home/ubuntu/workspace/internal.private-hub/apps/scrapers/ssh-reports-enricher"
            fi
            FALLBACK_DIR="/home/ubuntu/workspace/internal.private-hub/apps/scrapers/ssh-reports-enricher"

            if [ -d "$DEPLOY_DIR" ]; then
              if [ ! -d "$DEPLOY_DIR/.git" ] || [ ! -f "$DEPLOY_DIR/docker-compose.yml" ]; then
                if [ "$DEPLOY_DIR" != "$FALLBACK_DIR" ] && [ -d "$FALLBACK_DIR/.git" ] && [ -f "$FALLBACK_DIR/docker-compose.yml" ]; then
                  echo "PROJECT_DIR is not a deployable repo; using $FALLBACK_DIR"
                  DEPLOY_DIR="$FALLBACK_DIR"
                else
                  echo "Deploy directory is invalid: $DEPLOY_DIR"
                  exit 1
                fi
              fi
            fi

            # deploy_prepare.py로 git fetch/reset + .env 재생성
            python3 ~/secrets/deploy_prepare.py \
              --dir  "$DEPLOY_DIR" \
              --repo "git@github.com:$REPO_OWNER/$REPO_NAME.git" \
              --sha  "$EXPECTED_SHA" \
              --app  "reports-enricher"

            cd "$DEPLOY_DIR"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                docker-compose "$@"
              fi
            }

            # reports-enricher 재배포
            compose pull reports-enricher
            compose up -d --no-build --force-recreate reports-enricher

            RUNNING_SHA="$(docker inspect ssh-reports-enricher-prod --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            if [ "$RUNNING_SHA" != "$EXPECTED_SHA" ]; then
              echo "reports-enricher revision mismatch: expected=$EXPECTED_SHA running=$RUNNING_SHA"
              exit 1
            fi
            echo "reports-enricher running revision: $RUNNING_SHA"

            docker image prune -f
